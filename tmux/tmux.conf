TMUX_FZF_PREVIEW=0

 # TPM --------------------------------------------------------------------------
 # ------------------------------------------------------------------------------
 # List of Plugins
 set -g @tpm_plugins "          \
   tmux-plugins/tpm             \
   tmux-plugins/tmux-resurrect  \
   # olimorris/tmux-pomodoro-plus \
   # sainnhe/tmux-fzf
 "
 # Initializes TMUX plugin manager.
 run-shell ~/.tmux/plugins/tpm/tpm

# Custom bindings (after TPM to override plugin defaults)
# ------------------------------------------------------------------------------

# Quick shell commands via prefix + o + {key}
bind-key o switch-client -T quick_commands
bind-key -T quick_commands r run-shell "zsh -ic 'or'"
bind-key -T quick_commands h run-shell -b "cd '#{pane_current_path}' && zsh -ic 'hh'"

# FZF session switcher (prefix + p)
bind-key p display-popup -E -B -w 50% -h 50% "tmux list-sessions -F '#{session_name}' | fzf --reverse --height=100% --bind 'enter:become(tmux switch-client -t {})'"

# Pomodoro toggle (prefix + P)
bind-key P run-shell "/Users/nathaniel.watts/.config/tmux/plugins/tmux-pomodoro-plus/scripts/pomodoro.sh toggle"
