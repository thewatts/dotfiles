# GENERAL CONFIGS ==============================================================
# ==============================================================================

# Full Colors & Italics
# https://medium.com/@dubistkomisch/how-to-actually-get-italics-and-true-colour-to-work-in-iterm-tmux-vim-9ebe55ebc2be
set -g default-terminal 'xterm-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# Make keys more responsive ( via TMUX book )
set -s escape-time 0

# Mouse support
setw -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# Scrollback for days (default is 2000)
set -g history-limit 20000

# Needed for vim gitgutter, autoread, etc.
set -g focus-events on

# General Key Bindings - `tmux list-keys` to see current bindings
# ------------------------------------------------------------------------------

# Unbind regular prefix, rebind to ctrl + a
unbind C-b
set -g prefix C-a

# Restore `clear screen` to prefix + l
bind l send-keys 'C-l'

# Reload configuration with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"

# Set VI-keys for copy mode / session list
setw -g mode-keys vi

# Vim-style copy & paste
bind -T copy-mode-vi 'v'     send -X begin-selection
bind -T copy-mode-vi 'y'     send -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi 'Enter'
bind -T copy-mode-vi 'Enter' send -X copy-pipe-and-cancel "pbcopy"

# WINDOW MANAGEMENT ============================================================
# ==============================================================================

# Rename window numbers
set -g renumber-windows on

# Key Bindings
# ------------------------------------------------------------------------------

# Create new Window
bind c new-window -c "#{pane_current_path}"

# Create new Session
bind n new-session -c '~'

# Split Window horizontally && vertically
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane selection - https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Resizing
# ------------------------------------------------------------------------------

# Any of the below can be repeated easily by holding down Ctrl,
# hitting 'a' and then pressing H, J, K, or L repeatedly until the
# pane is the desired size.
bind -r H resize-pane -L 5 # grow the current pane leftwards with <C-t>H
bind -r J resize-pane -D 5 # grow the current pane downwards with <C-t>J
bind -r K resize-pane -U 5 # grow the current pane upwards with <C-t>K
bind -r L resize-pane -R 5 # grow the current pane rightwards with <C-t>L

# STATUS BAR ===================================================================
# ==============================================================================

# Set Title on each Pane
set -g set-titles on

# Use Prefix-/ to toggle status bar
bind / set status

# Set Status Bar position
set -g status-position top

# Set Status Bar update interval - every `n` seconds
set -g status-interval 1

# Auto rename pane tabs
setw -g automatic-rename on

# By default, all windows in a session are constrained to the size of the
# smallest client connected to that session, even if both clients are
# looking at different windows.
#
# This fixes that
setw -g aggressive-resize on

# Activity Notifications
# ------------------------------------------------------------------------------

# Highlight windows that have unseen activity
setw -g monitor-activity off

# Don't show a notification when there is activity in a window
set -g visual-activity off

# Clipboard
set -g set-clipboard on
set -ag terminal-overrides "vte*:XT:Ms=\\E]52;c;%p2%s\\7,xterm*:XT:Ms=\\E]52;c;%p2%s\\7"

# Theme -----------------------------------------------------------------------
# Automatically picks dark/light based on macOS appearance on startup
if-shell "defaults read -g AppleInterfaceStyle &>/dev/null" \
    "source-file ~/.config/tmux/nostromo.conf; set -g @theme dark" \
    "source-file ~/.config/tmux/rose-pine-dawn.conf; set -g @theme light"

# PLUGINS ######################################################################
################################################################################

# TMUX-Resurrect ---------------------------------------------------------------
# ------------------------------------------------------------------------------
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'off'

# tmux-pomodoro-plus -----------------------------------------------------------
# Disable plugin's default hotkeys (we use a custom key table below)
set -g @pomodoro_toggle 'OFF'
set -g @pomodoro_cancel 'OFF'
set -g @pomodoro_skip 'OFF'
set -g @pomodoro_notifications 'on'
# Styling (icons, colors, granularity) is in theme files

# TPM --------------------------------------------------------------------------
# ------------------------------------------------------------------------------
# List of Plugins
set -g @tpm_plugins "              \
  tmux-plugins/tpm                 \
  tmux-plugins/tmux-resurrect      \
  olimorris/tmux-pomodoro-plus     \
"
# Initializes TMUX plugin manager.
run-shell ~/.tmux/plugins/tpm/tpm

# Custom bindings (after TPM to override plugin defaults)
# ------------------------------------------------------------------------------

# Quick shell commands via prefix + o + {key}
bind o switch-client -T quick_commands
bind -T quick_commands r run-shell "zsh -ic 'or'"
bind -T quick_commands h run-shell -b "cd '#{pane_current_path}' && zsh -ic 'hh'"

# Toggle ❌ on session name (prefix + m) - mark Claude sessions as "needs attention"
bind m if-shell "tmux display-message -p '#{session_name}' | grep -q '❌$'" \
    "run-shell \"tmux rename-session \\\"\\$(tmux display-message -p '#{session_name}' | sed -E 's/ ❌$//')\\\"\"" \
    "run-shell \"tmux rename-session \\\"\\$(tmux display-message -p '#{session_name}' | sed -E 's/ (🤖|💬|❓|❌)$//') ❌\\\"\""

# FZF session switcher (prefix + p)
# Colors defined in theme files via @fzf-colors
bind p display-popup -E -B -w 50% -h 50% "tmux list-sessions -F '#{session_name}' | fzf --reverse --height=100% --color=\"$(tmux show-option -gqv @fzf-colors)\" --bind 'enter:become(tmux switch-client -t {})'"

# Pomodoro (prefix + P + {s=start, p=pause/unpause, c=cancel, x=skip, m=menu})
bind P switch-client -T pomodoro_commands
bind -T pomodoro_commands s run-shell "~/.config/tmux/plugins/tmux-pomodoro-plus/scripts/pomodoro.sh start"
bind -T pomodoro_commands p run-shell "~/.config/tmux/plugins/tmux-pomodoro-plus/scripts/pomodoro.sh toggle"
bind -T pomodoro_commands c run-shell "~/.config/tmux/plugins/tmux-pomodoro-plus/scripts/pomodoro.sh cancel"
bind -T pomodoro_commands x run-shell "~/.config/tmux/plugins/tmux-pomodoro-plus/scripts/pomodoro.sh skip"
bind -T pomodoro_commands m run-shell "~/.config/tmux/plugins/tmux-pomodoro-plus/scripts/pomodoro.sh menu"

# Toggle theme (prefix + T)
bind T if-shell "[ \"$(tmux show-option -gqv @theme)\" = 'dark' ]" \
    "source-file ~/.config/tmux/rose-pine-dawn.conf; set -g @theme light" \
    "source-file ~/.config/tmux/nostromo.conf; set -g @theme dark"
