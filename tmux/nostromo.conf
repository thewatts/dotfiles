# Nostromo - dark theme for tmux

# Color Palette
set -g @theme-base '#141D22'
set -g @theme-surface '#1e2628'
set -g @theme-overlay '#2a3538'
set -g @theme-muted '#3a4c4e'
set -g @theme-text '#A5FBFF'
set -g @theme-blue '#34A2DF'
set -g @theme-green '#3df2ad'
set -g @theme-red '#dd513c'

# General
set-option -g status-style "fg=#{@theme-text},bg=#{@theme-base}"
set-option -g status-left-style "fg=#{@theme-muted},bg=#{@theme-base}"
set-option -g status-right-style "bg=#{@theme-base}"
set-option -g message-style "fg=#{@theme-blue},bg=#{@theme-base}"
set-option -g message-command-style "fg=#{@theme-blue},bg=#{@theme-base}"
set-window-option -g mode-style "fg=#{@theme-base},bg=#{@theme-blue}"

# Status Bar - two rows
set -g status 2
set-option -g status-left-length 120
set-option -g status-right-length 100

# Row 0 (top): session name (left) | date + time (right)
set -g status-format[0] '#[fg=#{@theme-blue},bg=#{@theme-base}] #S#[align=right,fg=#{@theme-muted}]%a %d %b %H:%M '

# Row 1 (bottom): window list (left) | spotify + pomodoro (right)
set -g status-format[1] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#[list=on] ,#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange default]#[list=on] }#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -g status-left ""
set-option -g status-right '#[fg=#{@theme-muted}]#(~/.config/tmux/scripts/tmux-spotify.sh) ·#{pomodoro_status}#[fg=#{@theme-muted}] '

# Window Status
set-window-option -g window-status-current-format " ● #W {#I} "
set-window-option -g window-status-current-style "fg=#{@theme-blue},bg=#{@theme-base}"
set-window-option -g window-status-format " ○ #W {#I} "
set-window-option -g window-status-style "fg=#{@theme-muted},bg=#{@theme-base}"

# Pane Borders (invisible - matches background)
set-option -g pane-active-border-style "fg=#{@theme-base}"
set-option -g pane-border-style "fg=#{@theme-base}"

# Window background
set -g window-style "bg=#{@theme-base}"
set -g window-active-style "bg=#{@theme-base}"

# Pomodoro
set -g @pomodoro_on "#[fg=#3df2ad]  "
set -g @pomodoro_complete "#[fg=#34A2DF] 󰞑 "
set -g @pomodoro_pause "#[fg=#dd513c] 󱫟 "
set -g @pomodoro_prompt_break "#[fg=#3df2ad]  rest!"
set -g @pomodoro_prompt_pomodoro "#[fg=#34A2DF]  ready?"
set -g @pomodoro_granularity 'on'
