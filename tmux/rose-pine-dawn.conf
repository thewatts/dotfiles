# Rose Pine Dawn - light theme for tmux
# https://rosepinetheme.com/palette/dawn

# Color Palette
set -g @theme-base '#faf4ed'
set -g @theme-surface '#fffaf3'
set -g @theme-overlay '#f2e9e1'
set -g @theme-muted '#9893a5'
set -g @theme-subtle '#797593'
set -g @theme-text '#575279'
set -g @theme-love '#b4637a'
set -g @theme-gold '#ea9d34'
set -g @theme-rose '#d7827e'
set -g @theme-pine '#286983'
set -g @theme-foam '#56949f'
set -g @theme-iris '#907aa9'
set -g @theme-hl-low '#f4ede8'
set -g @theme-hl-med '#dfdad9'
set -g @theme-hl-high '#cecacd'

# General
set -g status-style "fg=#{@theme-text},bg=#{@theme-base}"
set -g status-left-style "fg=#{@theme-subtle},bg=#{@theme-base}"
set -g status-right-style "bg=#{@theme-base}"
set -g message-style "fg=#{@theme-pine},bg=#{@theme-overlay}"
set -g message-command-style "fg=#{@theme-pine},bg=#{@theme-overlay}"
setw -g mode-style "fg=#{@theme-base},bg=#{@theme-foam}"

# Status Bar - two rows
set -g status 2
set -g status-left-length 120
set -g status-right-length 100

# Row 0 (top): session name (left) | date + time (right)
set -g status-format[0] '#[fg=#{@theme-pine},bg=#{@theme-base}] #S#[align=right,fg=#{@theme-subtle}]%a %d %b %H:%M '

# Row 1 (bottom): window list (left) | spotify + pomodoro (right)
set -g status-format[1] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#[list=on] ,#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange default]#[list=on] }#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -g status-left ""
set -g status-right '#[fg=#{@theme-subtle}]#(~/.config/tmux/scripts/tmux-spotify.sh)#{?#{pomodoro_status}, ·#{pomodoro_status},}#[fg=#{@theme-subtle}] '

# Window Status
setw -g window-status-current-format " ● #W {#I} "
setw -g window-status-current-style "fg=#{@theme-pine},bg=#{@theme-base}"
setw -g window-status-format " ○ #W {#I} "
setw -g window-status-style "fg=#{@theme-subtle},bg=#{@theme-base}"

# Pane Borders
set -g pane-border-style "fg=#{@theme-hl-med}"
set -g pane-active-border-style "fg=#{@theme-hl-med}"

# Window background
set -g window-style "bg=#{@theme-base}"
set -g window-active-style "bg=#{@theme-base}"

# FZF
set -g @fzf-colors 'bg:#faf4ed,fg:#575279,hl:#286983,bg+:#f2e9e1,fg+:#575279,hl+:#286983,info:#9893a5,prompt:#b4637a,pointer:#b4637a,marker:#ea9d34,border:#dfdad9,header:#286983'

# Pomodoro
set -g @pomodoro_on "#[fg=#286983]  "
set -g @pomodoro_complete "#[fg=#56949f] 󰞑 "
set -g @pomodoro_pause "#[fg=#b4637a] 󱫟 "
set -g @pomodoro_prompt_break "#[fg=#56949f]  rest!"
set -g @pomodoro_prompt_pomodoro "#[fg=#286983]  ready?"
set -g @pomodoro_granularity 'on'
